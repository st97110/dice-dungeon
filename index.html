<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>骰子地下城 - Dice Dungeon</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #0c0c0c;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      letter-spacing: 4px;
      color: #b87fff;
      margin: 0 0 12px;
    }
    .sub {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin-bottom: 16px;
    }
    #terminal {
      background: #000;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(184, 127, 255, 0.15);
      border: 1px solid #2a2a2a;
    }
    #status {
      text-align: center;
      color: #777;
      font-size: 12px;
      padding: 12px;
    }
    #status.error { color: #ff6b6b; }
  </style>
</head>
<body>
  <script src="coi-serviceworker.js"></script>
  <div class="wrap">
    <h1>骰子地下城</h1>
    <div class="sub">Roguelike Gambling Dungeon · 在終端機輸入後按 Enter</div>
    <div id="terminal"></div>
    <div id="status">正在載入 Pyodide… 首次載入約需 5-10 秒</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="main.js"></script>
</body>
</html>
